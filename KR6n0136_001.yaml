body:
  text: 明匡山五乳廣益纂釋八識者一眼識二耳識三鼻識四舌識五身識六意識七末那識八阿賴耶識前六從依得名第七相應立號第八功能受稱如百法中解規矩者初玄奘大師糅成唯識論就窺基法師乃奘師弟子因見本論十卷文廣義幽遂請奘師集此要義名集施頌集諸法義惠施衆生將八箇識分為四章每章作頌一十二句將五十一心所各派本識位下有多寡之不同條然不紊故稱規矩然論雖十卷其義盡此四十八句包括無遺可謂最簡最要為一大藏教之關鑰不唯講者不明難通教綱即參禪之士若不明此亦不知自心起滅頭數所謂佛法之精髓也良以一真法界圓明妙心本無一物了無身心世界之相又何有根境對待妄想分別之緣影乎原此心境皆因無明不覺迷此一真法界不生不滅真心與生滅和合變為阿賴耶識依此識變起見相二分故見為心相為境故緣塵分別好醜取捨者皆妄識耳若了心境唯識則分別不生一心圓明永離諸相矣今以未悟一心故須先了唯識心境則生滅心行當下消亡一心可入耳此頌大綱單舉八識心王緣境之時境有好醜故心所從之執取起憎愛取捨故作善作惡善惡為因故感苦樂二報為果然此八識心王本無善惡而能造業者乃五十一心所助成心王以造善惡之業則業力牽引受苦受樂衆生生死之法唯此而已此中開列八識各具心所多寡之不同造業有強弱之不一分別皎然使學者究心了知起滅下落易於調治耳以衆生日用見聞覺知不離心境其能緣之心具有三量謂現量比量非量言現量者現謂顯現量謂量度以第一念現前明了不起分別不帶名言無籌度心親得法體如鏡現像又如見山便知是山見水便知是水不假分別故名現量言比量者比擬量度而知其然如隔墻見角知彼有牛隔山見烟知彼有火以同時率爾意識隨見隨即分別即屬比量以有比度故名比量言非量者若心緣境時於境錯謬虗妄分別不能正知境不稱心名為非量此三量乃能緣之心也而所緣之境亦有三謂性境帶質境獨影境性境者乃現量所緣言性者實也謂根塵實法本是真如妙性無美無惡以能緣之心無分別故境無美惡是為性境頌云性境不隨心謂此根塵等相分皆有實種生不隨能緣見分種生故此性境以實五塵為體具能所八法成故帶質境者乃比量所緣其帶質境有真有似以六七二識各有所緣故若六識外緣五塵比度長短方圓美惡等相屬第二念意識分別故為比量以此長短等相是帶彼外境本質變帶生起名似帶質以是假故故云以心緣色似帶質中間相分一頭生謂單從能緣見分起故獨影有二謂有質無質其意識緣五塵過去落謝影子名有質獨影亦名似帶質若意識緣空華兔角等事名無質獨影此似帶質并有無質獨影皆從能緣見分所變假相分故曰獨影唯從見此三以第六識見分所變假相分為體故真帶質境者即以心緣心故云以心緣心真帶質中間相分兩頭生謂七識緣八識見分為我時其相分無別種生一半與第八所緣本質同種生一半與第七能緣見分同種生從本質生者即無覆性從能緣見分生者即有覆性以兩頭攝不定故曰帶質通情本以能所同一見分所變故名真帶質此心境之辨也以心境對待境有逆順好醜則能緣之心依之而起憎愛取捨等故起惑造業染成善惡二性所感將來受苦樂二報故心王則有苦受樂受若不起善惡屬無記性則平平受因此受亦有三所以三界衆生上下升沉輪回苦樂不忘者皆由唯識內習熏變發起心境由是三量三境三性三受故不能出離生死皆心意識之過也故論云衆生依心意意識轉今唯識宗因凡夫日用不知苦樂誰作誰受外道妄立神我二乘心外取法故佛說萬法唯識使知唯識則不出自心以心不見心無相可取正是要學者直達自心本無此事耳今八識頌而稱規矩者只是發明心境其所作善作惡皆是心所助成以各具多寡之不一故力有強弱之等此唯識之大綱也其心所法已見百法今預列心境則臨文不必繁解恐礙觀心耳五識頌性境現量通三性此下十二句頌眼耳鼻舌身等五轉識也首句先頌五識境量與三性問前五轉識未轉依位於三量中定屬何量於三境中定屬何境答前五識量屬現量境屬性境以五識與八同體故緣境之時單屬現量前五轉識乃八識精明之體映在五根門頭了境之用以初映境時當第一念未起分別不帶名言無籌度心故名現量所緣之境即屬性境性者實也即實根塵相分境有實種生以現量具三義一現在簡過未二顯現簡種子三現有簡無體法護法云五識唯緣實五塵境即不緣假相分故名性境但任運緣不作行解不帶名言得法自相故名現量且如眼識緣青黃赤白四般實色時其實色上長短方圓假色雖不離實色有眼識但緣青等實色不緣長短假色長短假色唯意識作長短分別緣俱舍云眼色但能了青不能了是青意識了青亦能了是青故又眼識緣青境自相時得青色之自相若後念分別意識才作解心即帶名言便是共相屬比量也故假智詮不得自相唯於諸法共相而轉唯五識緣五境時具四義故得法自相一任運二現量三不帶名言四唯緣現在境故名得法自相也問五根依何教理證是現量答圓覺經云譬如眼光照了前境其光圓滿得無憎愛可證五根現量不生分別其眼光到處無有前後終不捨怨取親愛妍憎醜例如耳根不分毀讚之聲鼻根不避香臭之氣舌根不揀甜苦之味身根不隔澀滑之觸以率爾心時不分別故若剎那流入意地才起尋求則是同時意識相應而起便落比量則染淨心生取舍情起以五識唯緣現在不緣過未但只一度故云性境現量言三性者乃善惡無記三性問五識現量本無善惡與八同體無有分別何與第六通不善性耶答此約同時意識而引自類種子同時而起則三性皆通此指意識任運而言非專指五識也又曰五六相須以隨念分別時與嗔等惡所俱起故成不善問何為相須曰五由六而方生六由五而明了前五與六為明了門六與五為分別依是相須理眼耳身三二地居此言三界五識行止之地也三界分為九地欲界一地名五趣雜居地具有八種識色界四地謂初禪離生喜樂地二禪定生喜樂地三禪離喜妙樂地四禪捨念清淨地今言二地者謂色界初禪離生喜樂地也以欲界五識全具初禪天人以禪悅為食不食段食故離舌識既不受食亦不聞香故亦離鼻識但有眼耳身三識而已居者止也謂此三識亦止於初禪若至二禪定生喜樂地則眼不見色耳不聞聲身不知觸以入定中而此三識亦無故云居止於此耳遍行別境善十一中二大八貪嗔癡此頌五識具三十四相應心所也識論云恆依心起與心相應繫屬於心故名心所如屬我物立我所名心王於所緣唯取總相心所於彼亦取別相助成心事得心所名雖諸心所名義無異而有六位種類差別謂遍行有五別境有五善有十一根本惑有六隨惑有二十不定有四合五十一此五識於六位中唯闕不定言遍行五者遍周圓義行是遊履義緣境義遍行一位具四一切謂一切性即善惡無記三性也一切地即三界中九地也一切時即過現未來及一剎那時也一切俱即八識俱通也問曰何以前五具遍行五所耶答五八同體本識具此五法又能遍一切識然此五法心起必有故前五亦具此耳別境者謂別別緣境而得生故以欲等五法不遍心故唯遍三性九地以四境別名為別境也四境者謂欲所樂境所決定境於慣習境於所觀境慧則於所觀境揀擇斷疑是其體用也問曰何以前五具別境五心所耶答前五任運緣境率爾同時俱意識隨見隨即分別各引自類種子各各緣境不同且如眼根緣色則不同耳根緣聲等以各各不同故識具此別境五法也具十一善法者以五識是性境現量故具此耳問曰五識既是性境現量如何有根惑三隨惑中二大八十染心所耶答五識本無染法緣五識起時以第六為分別依第七為染淨依故挾帶染法與之俱起也若小隨十法各專有主故不具耳以五識任運無矜恃執持之力故無根惑之見慢以了境分明故無疑與不定故五識但具三十四耳五識同依淨色根此頌五識依根得名也五識隨依色根立名具有五義曰依根之識根所發識屬根之識助根之識如根之識言依者五義之一也言淨色者揀非浮塵又言依根擇非依境境但為所緣無發識用如根壞時設若有境識亦不起唯根能發故曰依根非浮塵者以彼虗假有損壞故故名為浮又無見聞覺知之用名之為塵故楞嚴云浮塵根眼如蒲桃朵耳如新卷葉鼻如雙垂瓜舌如初偃月身如腰鼓顙是也以有損壞故非五識之所依耳言依淨色根者楞嚴云元依一精明分成六和合以見精映色結色成根等根元目為清淨四大故名淨色以此淨色即無明殼也亦名勝義根謂於眼等一八淨色如淨醍醐有此性故眼等識生無即不生照境發識以成根用故名勝義不同浮塵虗假損壞此無損壞故亦名勝義不同浮塵無見聞等此能覺知故亦名勝如眼能見色耳能聞聲鼻能嗅香舌能嘗味身能覺觸是也問淨色根畢竟是何物答此無見有對色雖有質礙而非眼所得見比量所知非現量得如何可指然此識精圓映五門隨浮根之照用是知浮根則有五而淨色唯一故曰元依一精明耳九緣七八好相鄰此頌生識之緣也有為之法必仗緣生今生八識之緣大槩有九但各識全闕之不同耳故曰眼識九緣生耳識唯從八鼻舌身三七後三五三四九緣者一空緣即根境相離中間無礙空隙之空也二明緣即日月燈等照燭之明也三根緣即發識之根也四境緣即諸識所緣之境也五作意緣即遍行中之作意也六分別依即第六識也七染淨依即第七識也八根本依即第八識也九種子緣即是諸識各有自類親種子也此中九緣於四緣中三緣所攝種子即因緣也境緣即所緣也餘七緣即增上緣也諸識從緣唯眼識全具耳暗亦聞除明唯從八鼻舌身三合中取境暗亦能知故除空明若根境中間空隙不相合者即身不覺觸舌不知味鼻不知香故後三五三四者謂六識具五緣七識具三緣八識具四緣六識五緣者根境作意根本種子於空明之外又除分別即自體故不言染淨即根緣故七識三緣者根本依作意種子不言根境者謂依彼轉緣彼即根境故八識四緣者根境作意種子不言根本即自體故不言染淨即根緣故無分別者不緣見分無分別故若從頭各增一等無間則眼等即十緣等無間者乃各識前念已滅即開闢處所引後念令生中間無隔者即相續心也前念不去後念不生為前念自體占自路故故識生時須用此緣耳合三離二觀塵世此頌五識取境不同也眼耳二識離中取境鼻舌身三合中取境何以知之曰知處不知處異壞根不壞根別以識從緣生因緣顯識以從緣義知有離合謂九緣中空明二緣是顯根離義眼耳二識既具空緣是離中知也若無空緣境逼附根不唯無知而且損根如纖塵入眼即壞其目大聲附耳即使人聾故曰壞根不壞根別也鼻舌身三不具空緣是合中知也若具空緣根境遠離香味觸塵俱不知故今三識不具空緣故香臭入鼻酸醎上舌寒熱著身三根宛然分明了境即知不壞故又如眼即知色境在何方耳即知聲從何方來而鼻舌身則不知境之處所故知來處者表為離知不知境處者表是合取也觀者即能緣見分眼等五識及諸心所塵世者即所緣相分乃色等五塵也愚者難分識與根此頌小乘不知八識根本種子為生識之緣以為根識互生也淨色根行相微細其與識最易淆濫故難分別愚法者謂聲聞人但斷煩惱障未斷所知障故名為愚何謂難分曰由根與識生必同境五識於境任運現緣不起分別是現量性境五根於境亦任運緣隨因境勢亦無分別故說難分既實難分根識何別曰五根於境如鏡對相雖有物對略無作意樂欲念起故無分別五識於境如鏡現相雖似像現亦有隨時俱意識樂欲念起而無計度名言種類名無分別是二別義小乘不知根之與識各有種子現行以為根識互生根之種現但能導識之種現謂根為生識之緣則可謂生識則不可以識自有能生之種子故蓋識乃心法即八識之見分根乃色法即八識之相分此色心之不同也根能照境識能緣境此根識之用不同也所言難分者乃論主謂愚者之不能分耳故世尊為愚心者開心說蘊為愚色者開色說處為心色俱愚者俱開說十八界豈非根識之實難分耶如此又何謂難分耶曰始自華嚴至於楞嚴演此三科不知幾百千過多聞如阿難尚以心知眼見為言佛以門能見否詰之以此觀之則根識難分可知矣有漏章竟變相觀空唯後得果中猶自不詮真前八句乃有為法此四句頌五識轉成所作智乃出世無為法也先頌前五轉智必不能親緣真如義謂安慧師執前五因中既成無漏變相緣如以見相二分是遍計性自證分是依他起性至佛果位中自證分親緣真如以無相見遍計性故護法師以見相二分為依他起六七二識為遍計執自證分為圓成實以此為正義故論主以此二句破之變謂變帶相謂己相即能緣心變帶起本質家相狀之相而緣名疏所緣緣也觀謂能緣之見分空乃所緣之真如以彼執前五因中帶相緣如故曰觀空唯後得者簡非根本既非本智則不能親緣真如果中猶自不詮真者果中乃佛果位中也詮者具也意謂前五轉智不唯因中不緣真如縱在佛果位中亦不能親緣真如以五八果上圓安慧計五識因中成無漏一錯也又以自證分為依他起乃依他真如而起者則所成之智乃依他根本修而後得者故名後得智則不能親緣真如又計至佛果位自證分緣如既以自證為依他若是依他即屬後得後得豈能緣如又一錯也故此二句乃破異師計耳三藏釋帶有二義一挾帶二變帶然相亦有二義一體相之相二相狀之相言挾帶者謂根本智親挾真如相而緣則以體相為相也變帶者謂後得智緣根身器界諸有為法必帶相狀變為空體雖觀諸法空未離空相此但能外緣諸法不能親緣真如故圓明初發成無漏三類分身息苦輪此頌五識果上轉也圓明即大圓鏡智以五八果上圓謂佛果位第八之大圓鏡智一開發時而第五之成所作智倐然現前故成無漏也問前五轉智何云第八圓明初發耶答以前五根是第八親相分能變之第八有漏而所變之五根亦有漏故根能發識根既有漏識亦有漏以五八同體故待第八大圓鏡智初現前時則前五根五識俱成無漏而即轉成成所作智矣三類分身者謂一大化身即千丈盧舍那為應十地之所現也二小化身即丈六金身為應二乘凡夫之所現也三隨類不定化謂如來誓願弘深慈悲普覆隨諸種類有感即應或現大身滿虗空中或現小身種種不等以在因中有外作用故果上成成所作智利樂有情示現神道種種變化引導衆生出生死苦故云息苦輪也六識頌三性三量通三境此頌六識三性三量三境皆通也意識緣境分別最強所以一切善惡皆以意為先導意起速疾意在言前意善則法正意惡則境邪如一氣噓之即溫吹之即冷似一水寒之即結暖之即融但依一心隨緣轉變故三性三量三境但通五十一心所全具也以通字貫於上下讀之言三性者善性則順益義順於正理益於自他不善性則違損義違於正理損於自他無記性則於善惡品無所記録故言三量者一現量現謂顯現明證衆境不帶名言無籌度心親得法體故名現量二比量比謂比類以於前境比度方知故中論云比量有三一如本如先見火有烟後見烟即知有火二如殘如炊飯一粒熟餘皆知熟三共見如眼見人從東去西定知彼去又如日出處則知是東日落處則知是西以比類而知故三非量謂心心所於緣境時錯謬分別不稱境知名為非量言三境者一性境即實根塵及定果色自有實種生乃前五與第八所緣及第六緣諸實色不帶名言無籌度心亦名性境及根本智緣真如時亦是性境以現證故二帶質境有二種一真帶質即以心緣心中間相分兩頭生挾帶本質爍起乃體相之相以能所同一見分故名真帶質二似帶質即以心緣色中間相分唯從能緣見分一頭變帶生起乃相狀之相名似帶質三獨影境有二種一有質獨影即第六緣五塵落謝影子以托彼外質變起影相故名有質所變相分亦與能緣見分同種生故名真獨影亦名似帶質二無質獨影即第六識緣空花兔角及過未等所變相分其相分唯第六同種生以本無空華等質故名無質唯從識變故名無質獨影問第六云何通緣三境耶答第六明了意識緣前五塵實境時率爾同時名為性境才落意地分別是青是黃即名似帶質若意識緣五塵過去落謝影子即名有質獨影境三界輪時易可知以第六識造種種業輪轉三界行相顯勝故曰易可知也相應心所五十一此頌六識五十一心所全具也相應有四義一時謂王所同時而起二依謂王所同一所依根三緣即王所同一所緣境四行謂王所三量行相俱同心所有三義一恆依心起要心為依方得起故二與心相應謂遍行等恆與心王相應一類起故三繫屬於心以遍行等看與何心生時便屬彼心之作意等故言五十一者謂此第六識六位心所俱相應故所以能取三界生死以業力殊勝故也善惡臨時別配之此頌第六識與善惡心所隨時逐境遇善則善心所與之相應遇惡則染心所與之相應邪正條然不相混濫但就善惡一念起時則心所齊集以類相從故曰分別配之性界受三恆轉易根隨信等總相連此頌第六識於三性三界三受之中恆常轉變改易正如善時忽生一惡念喜時忽生一憂念改易不定識論云此六轉識易脫不定故容與三受相應皆領違順俱非境故領順境相適悅身心說名樂受領違境相逼迫身心說名苦受領俱非境於身心非逼非悅名不苦不樂受或名五受以苦分憂以樂分喜故如是三受與五識相應說名身受與意識相應說名心受若惡念起時則根本惑與隨惑相連而起若善念起時信等善法亦相連而起以此染淨諸心所法相連意識於性界受三恆常轉易耳動身發語獨為最此頌第六識行相最勝於八識中獨此識最強以具三種思故一審慮思謂籌量時無造作故名審慮思二決定思意既決定有所作故名決定思三動發思動謂動身發謂發語動身之思名為身業發語之思名為語業思即是業故動發思為身語業則前二思為意業也具此三種思故造善惡業此識強於諸識耳引滿能招業力牽此頌上三業能招引滿二果牽引八識受生死苦也引者謂此識能引諸識造業滿者謂此識能引前五滿八識異熟果報故云一業引一果多業能圓滿也能招業力牽者如與善位十一相應則為善業牽之而往人天與根隨染位相應則為惡業牽之而往三途如影隨形故曰牽然其引業乃能造之思要是第六意識所起若其滿業能造之思從五識起然五無執不能造業雖造滿業亦非自能但由意引方能造作故五亦具善惡二性七八二識皆不能造無記性故有漏章竟發起初心歡喜地俱生猶自現纏眠此頌六識轉妙觀察智初下品轉也以第六識順生死流具有分別俱生我法二執若逆流還源亦仗此識作我法二空觀今轉識成智從觀行位入生空觀至七信位方破分別我執從八信起作法空觀歷三賢位至初地初心方斷分別法執故云分別二障極喜無頌言歡喜即初地也發起者初轉智也以第六識三品轉智初地下品轉八地中品轉等覺上品轉初心者以一地中有三種心謂入住出初入地時名初心耳分別二執已破俱生二執方現故云現纏眠纏即現行眠即種子以登地時俱生種現未純伏滅故云猶自現纏眠耳遠行地後純無漏觀察圓明照大千此頌第六識中品上品轉智義也遠行即第七地後字即八九十地至等覺位也謂登八地中品轉智猶未最極直至等覺後心方為最上品轉故曰圓明以究竟位中諸漏永盡無漏隨增性淨圓明到此地位六識方得純淨無漏即轉成妙觀察智而圓明普照大千之界矣謂如來善能觀察諸法圓融次第復知衆生根性樂欲以無礙辨才說諸妙法令其開悟獲大安樂皆妙觀察智之用也七識頌帶質有覆通情本隨緣執我量為非此頌七識境性量也此識於三境中唯緣真帶質境謂以心緣心中間相分兩頭生以挾帶本質己相而起名真帶質言通情本者揀前六識乃以心緣色為似帶質境也謂此帶質又通七識能緣心以恆起執故即情也又通八識見分是所緣即本也本者謂七識依此見分而立故以此七識緣第八見分為我中間相分乃體相之相以七識與八識見分本質交帶挾起故名為真以此相分一半與所緣第八見分同一種生一半與能緣第七見分同一種生以八識之見分一半作前七識即有覆性一半乃內八識見分體即無覆性今七識恆起遍計執第八見分為自內我故曰依彼轉緣彼故四性之中唯有覆無記若無覆無記則屬第八識以非善不善無可記録故名無記謂此識雖無善惡而恆與四惑相應蓋覆真性故名有覆無記隨緣執我量為非者此句乃揀量也若言帶質境則屬比量所緣今因與四惑相應隨緣第八見分執之為我本非是我謬執為我故名非量八大遍行別境慧貪癡我見慢相隨此頌七識所具相應心所也謂大隨八遍行五別境中之慧根本惑中貪癡見慢共十八心所也問此識何與八大相應耶答若無昏沉應不定有無堪任性掉舉若無應無囂動便是善等非染污位若染心中無散亂者應非流蕩非染污心若無失念不正知者如何能起煩惱現前若無不信懈怠放逸如何論說此三心所染心相應故染污意決定皆與八大隨煩惱相應而生問此識何與五遍行相應耶答此五法遍一切識與諸心等故七識應具也問何與別境中之慧相應耶答慧與我見為體性故故亦宜有問何與根惑中之貪癡見慢四煩惱相應耶答一我貪者謂此識一向貪愛第八見分執之以為我則耽染愛著不暫捨故二我癡者即無明謂此識不了第八之體本無實我妄計為實迷無我理故名我癡三我見者謂不了第八本非是彼之我而起我見妄認為我故四我慢者由執為我遂令驕倨自大貢高飛舉故問根本六中開見成十此識何獨具四耶答以有我見故餘諸見不生問何故此識不與疑瞋二煩惱相應耶答由我見故審詳明決疑無容起故不與疑相應由我愛故深生耽著瞋不得生故不與瞋相應問何故不與別境四法相應耶答謂欲是希望未遂合事此識恆與第八和合緣以為境更無希望故不與欲相應解者於事尚在未定起決定解印證持守此識決定恆執第八為自內我更無異念不煩印持故不與勝解相應念唯記憶過去所習事業此識恆緣第八現境不煩記憶故不與念相應定唯一意專注境此識任運剎那念念別緣不專不一故不與定相應也問何故此識不與善十一心所相應耶答善是淨故此識染污故不與善相應問何故不與十小隨相應耶答以忿等十法行相粗動此識審細故不與相應又無慚無愧唯是不善此識唯無記故亦不與相應問何故不與四不定相應耶答惡作是追悔過去所作事業此識恆緣第八無有疑悔故不與惡作相應睡眠是藉外緣辛苦勤勞身不自在心睡昧劣有時暫現此識一類內執第八為我不假外緣故不與睡眠相應尋伺者尋謂尋求令心匇遽於意言境粗轉為性伺謂伺察令心匇遽於意言境細轉為性此識唯依內門而轉一類執我不假尋伺故非七識所具耳恆審思量我相隨有情日夜鎮昏迷此頌七識自性行相皆是思量故恆相隨第八見分執之為我論云思量為性相者雙顯此識自性行相也意以思量為自性故即復用彼為行相故由斯兼釋所立別名以能恆審思量名末那故未轉依位恆審思量所執我相已轉依位亦恆審思量無我相故恆之與審於八識中有四句分別八識恆而非審謂不執我無間斷故六識審而非恆謂執我有間斷故五識非恆非審不執我有間斷故七識亦恆亦審執我無間斷故不恆則與八識血脈斷矣不審則與六識血脈斷矣以七識無本位故護法云五八無法亦無人六七二識甚均平五八無執六七有執是均平義五八一恆一非恆六七一恆一非恆亦是均平也有情日夜鎮昏迷者鎮常也謂第七識恆常思量審察一向執我故令諸有情恆處生死之中常於長夜昏迷而不自覺者以七識執我之過也四惑八大相應起六轉呼為染淨依此牒前染所與識相應故令有情日夜昏迷障真義智蔽聖慧眼其由煩惱為害耳轉者不定義即三性三量三境易脫不定名為轉識前七皆名轉識唯第八名不轉識第六轉識呼第七為染淨依者謂此識有漏內常執我故令第六念念成染由此識無漏恆思無我故令第六念念成淨七識為所依六識為能依依即根也是以第六成染成淨皆由第七識故云六轉呼為染淨依有漏章竟極喜初心平等性無功用行我恆摧此頌七識下品中品轉智義也凡一地具初中後三心即入住出故有三品今謂末那識於初地初心即當轉平等性智以地前六識作生空觀到初地初心即破分別二障故曰分別二障極喜無而平等性智方才現前此乃下品初轉也以俱生二執全未破故曰六七俱生地地除故從二地作雙空觀斷俱生二執起至第七無功用行破藏識方斷俱生我執故云我恆摧良由第六識入生空觀礙此七識俱生我執不生俱生法執猶存故云單執末那居種位平等性智不現前不現前者但未圓滿乃中品轉也故曰第七修道除種現由第六識入生法二空觀故礙此七識俱生我法二執不起故云雙執末那歸種位平等性智方現前直至等覺後心二執方才破淨此智方得圓滿乃上品轉也故曰金剛道後總皆無言居者居住歸者歸藏問第七轉智何由第六入雙空觀耶答第七乃有覆無記唯俱生無分別惑故以無分別於緣境時唯任運轉無力斷惑故登地時自不能轉由六識斷分別二障轉二空智故第七仗之得初下品轉也至八地無功用道乃破俱生我執俱生法執猶存故云我恆摧此但我執摧落乃中品轉耳如來現起他受用十地菩薩所被機此頌七識上品轉智義也以前初地初心但下品轉俱生我執但伏而未斷俱生法執猶存至七地無功用行名中品轉但我恆摧從八地起但伏俱生法執而猶間起皆非最極直至如來究竟位中煩惱所知二障種現俱盡平等性智方得圓滿名上品轉也故此智圓時則能現他受用微妙報身住華藏界為十地菩薩說大法也此佛說法二乘絶分故言十地菩薩所被機耳故曰於如來究竟位中轉成無漏則能現前他受用身即能被之佛十地菩薩乃所被之機也報身有二一自受用乃自受用廣大法樂與法身同體唯佛與佛乃能知之十地菩薩可見者乃他受用耳八識頌性唯無覆五遍行此頌八識性與心所也此識於四性中唯是無覆無記性問何以知是無覆無記耶答以此識是異熟性故異熟者異謂別異即因果性別熟謂成熟此唯屬果因果合說名為異熟既是異熟定非善染二性所攝若此識是善染者流轉還滅應不得成以非善染故能隨善染而成流轉還滅此約異熟顯無記也此識是善染依而非善染此若是善應非染依此若是染應非善依由非善染故能為善染依此約善染所依顯無記也此識是所熏性以非善染而能受善染熏若是善染應非受熏若不受熏則應善染因果皆成斷滅此約所熏顯無記也具上三義證知第八唯是無覆無記性攝言無覆者覆謂染法有障礙義有蓋蔽義障礙聖道不得生起蓋蔽真心不得清淨此識無此二義故名無覆言無記者謂善因感可愛之果惡因感非愛之果彼二皆有殊勝強盛之體可記可別此識無此二義故名無記如鏡體光明本非青黃故能現青黃耳問此識與幾心所相應耶答恆與作意觸受想思相應識論云阿賴耶識無始時來乃至未轉於一切位恆與此五心所相應以是遍行攝故正是楞伽經中流注生住滅也問此識何故不與別境五法相應答互相違故曰如何相違謂別境之欲希望所好樂事此識任彼善惡業轉無所好樂故不與欲相應勝解是印證守持決定之事此識任運不能印持亦無決定故不與勝解相應念是明記過去曾習之事使不忘失此識昧劣不能明記故不與念相應定能令心專注一境無有異緣此識任運剎那別緣三類故不與定相應慧唯簡擇得非得事此識微細昧略不能簡擇故不與慧相應且別境者別別緣境而得生故此識唯是一類相續故不與別境相應也問此識何故不與善所相應耶答此識唯是異熟無記非善性故故不與善十一相應問此識何不具染所耶答此識非惡性故故不與根隨煩惱相應問此識何不具四不定耶答惡作等四雖通無記非一切時常相續故不與異熟相應是故第八識唯具遍行五心所耳界地隨他業力生此頌第八識本無生死但隨業力而轉也謂由前六所造善惡業力牽引此識往來於三界九地五趣四生九中受異熟果為總報主以為體故以與前七色心等法為依止故問何偏為體答具三義故名真異熟一遍義謂此識遍三界簡前五識不遍無色界等二常相續簡第六有間斷故三業招簡第七全無業招自是有覆非他業故具此三義故能為體言受異熟果者謂由前六造善惡業牽引第八受善惡報相續不斷名異熟果言引業者引謂牽引謂業有力能引第八受總報故滿業者滿謂滿足謂滿別報即前六識造善惡業能滿第八善惡二果以一業引一果多業能圓滿故第八名總報主而前六名別報主也然前轉識之無記性者乃從異熟識起名異熟生非真異熟有間斷故以此第八當體雖無善惡而被他六識造善惡之業力而牽引於三界九地受生死者乃前六識之過也故前六識頌云引滿能招業力牽者此也二乘不了因迷執由此能興論主諍此頌第八深密義言二乘者簡非大乘謂小乘不知者以世尊一向未曾顯說故二乘人不信有此識所以不說者以此識甚深微細非思量所知非二乘智慧所覺在菩薩地盡亦不能盡知唯佛與佛乃能究盡故不說耳故云陀那微細識習氣成暴流真非真恐迷我常不開演陀那此云執持此識之體深隱精微故曰微細識習氣即所持種子謂識中無始微細生滅念念受熏以此習種能發現行引生諸趣於根身器界流轉無停故如暴流真非真恐迷言我若說為真其奈帶持種子妄習不除衆生將迷妄為真未免瀑流漂轉我若說為非真其奈體即真如離此無真衆生將棄真為妄未免向外馳求由此真與非真二俱難言是故非時非機故我常不開演以不令衆生墮彼二種之迷故也以世尊尋常但為小根說六識建立染淨根本故二乘一向未聞以淺智難知故不了耳又云我於凡愚不開演恐彼分別執為我故曰因迷執以小乘不信有此識故大乘論師引三經四頌四教十理證有此識故云由此能興論主諍引證之義識論廣明文繁不引浩浩三藏不可窮淵深七浪境為風此頌八識體性淵微隨緣生識之義也浩浩者廣大無涯之貌謂如來藏性海由不思議熏變而為業海故此識體廣大無涯以具三藏義故名為藏識三藏者一能藏即是能持義猶如庫藏能藏一切寶貝等物謂無量劫來所作一切善惡種子唯此識能藏此約持種邊說二所藏即是所依義猶如庫藏是寶貝等所依故此識是一切善染法所依處故名所藏此約受熏邊說又能藏義者謂根身等法唯此識能含藏故如像在珠故曰欲滅一切法總在賴耶中欲覔一切像總在摩尼內次所藏義者謂此識體即以色心等為所藏處以色心等是此識之相見二分故如珠在像內故曰欲覔賴耶識只在色心中欲覔摩尼珠只在青黃內所謂能藏自體於諸法中又能藏諸法於自體內也三執藏即堅守不捨義猶如金銀等藏為人堅守此識為染污末那堅執為自內我故名執藏以有此三義故令積劫因果不失不壞故云不可窮此識本是湛淵之心為四緣等境風鼓動故生起七識波浪造種種業故經云藏識海常住境界風所動洪波鼓冥壑無有斷絶時故云淵深七浪境為風也受熏持種根身器去後來先作主公此頌八識之力用也言此識既能受熏復能執持種子根身器界以是無記性故能受善染熏以其體廣大故能持種又能持根身器界令一期不散壞為所緣境以此故能為三界總報主也故往來六道死時後去投胎先來為衆生之命根故云作主公依經論而辨此識捨出之處瑜伽云善業從下冷惡業從上冷二皆至於心一處同時捨雜寶藏經云頂聖眼生天人心餓鬼腹旁生膝蓋離地獄腳板出然經論異者經明六趣差別論明善惡兩途其義一也有漏章竟不動地前才捨藏金剛道後異熟空大圓無垢同時發普照十方塵剎中此頌八識次第捨名乃至究竟轉智之義也此第八識具三種名一阿賴耶識二異熟識三庵摩羅識一名阿賴耶識此云無沒以真如隨生死而不失不壞故云無沒又云藏識以具三藏義故謂此識因七識念念執為我故從無始來長劫相續沉淪生死別教菩薩從初發心修行歷過三賢登地以去至第七地破俱生我執煩惱永斷不受彼熏七識不執我三藏之名從此才捨顯過最重故云不動地前才捨藏也二名異熟識謂八地以後尚有微細俱生法執及有漏善種尚引後果亦從無始至等覺位名異熟識亦具三義一變異而熟因種變異果方熟故二異時而熟因滅果生定異時故三異類而熟以善惡因至果方熟故具此三義名異熟識至金剛道後等覺後心證解脫道異熟方空一念頓斷最初生相無明為入妙覺因亡果喪此異熟識方斷故云金剛道後異熟空也三名菴摩羅此云白淨無垢識謂如來藏清淨真心雖在生死本來無染返流還淨從證佛果盡未來際名無垢識本如來藏以有鑒機照用無思而應故亦名識此識與大圓鏡智同時發起相續執持無漏種故故云大圓無垢同時發到此境智相應法身顯現圓明普照十方塵剎故云普照十方塵剎中也良由始以一念不覺之無明迷此一心遂將真如理體變而為妄相本有智光變而為妄見今返妄歸真則泯見相而歸一心理智一如方極一心之源此唯識之極則乃如來之極果也題二百法明門八識規矩纂釋後余不敏天黜其形自信有尊形者存故夙抱超然之志在齠齓即聞我大師法雷起蟄時則躍然歸依結想有年往癸丑歲從先人宦遊於衡適禮大師於靈湖即蒙攝受時見虗中益公其精敏機警知為法器然未識所志向及丁巳夏大師歸老匡廬之五乳峰下余以二親見背乃決志依歸求出世業於辛酉春始判然入山大師憐之從入室後得聞法要朝夕與公商確奧義洞徹言外余躍然喜也不唯與之忘形抑忘心矣食息靡間一日見公案頭百法規矩纂釋展卷同劉孝廉仲安氏閲之一讀三歎曰公之精義入神之如此也心雖不間於宗案習聞此論雖老師宿學亦苦于難入蓋以論釋論文簡義幽且斷章不備況舊無解故多面墻近則本論釋有數家又未參合於此猶然故吾此末學所以泣岐也今公詳論文於名相之下取古今諸疏會通一貫且得親聞大師之心印而折衷之故文如析薪義若觀火不勞旁搜曲討而洞達法相之源不異三車執筆也意別數載何公超悟之蚤而入法之精如此詎非拔靈根於虗壤者未易易也顧豫與公大有夙契愧不能讚其萬一聊述此以紀法緣之始末云天啓二年歲在壬戌之秋七月既望秣陵遺民方遠題于五乳峰下之溪上閣百法規矩纂釋後敘余自降心白業歸命佛乘時抱出塵之志切喜依教尋源惟以如來法海汪洋義天廣博於奢摩他路未能下手每開卷未嘗不望涯而嘆也及詢諸尊宿咸教以先明起信百法諸論云此乃一大藏之關鍵如欲萬里之行始於足下未有足下之步不移而能之萬里者是知百法規矩乃足下之步也故曰明得百法可入大乘之門矣余即簡魯菴補注見其文約義幽猶然故吾罕得其要丙寅秋適匡山虗公來遊黃山錫過白嶽余與家仲兄遇於汶上首請楞嚴三觀次及圓覺起信而師每發一言義出常見酬一難理徹玄微所謂獅兒哮吼自與羣獸別也一日於師囊中披得此纂與仲兄捧覽三復不覺從前滯礙劃然已解百法則詳而備規矩則簡而明使初學之士一見了然無復泣岐之歎矣持斯鑰而竟探寶藏頓獲家珍豈不快哉余曰此希有之法曷不公諸宇內師謙而祕之余堅請得壽諸梓以廣法施願諸學者因言得義了義明心庶不負虗師亦不負自己是為敘時崇禎四年歲次辛未花朝天都弟子在新程開裕拜撰並書
