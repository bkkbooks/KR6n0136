body:
  text: 此規矩纂釋者以古解單用論文故學者難入今時有證義集解亦互有出入故學者猶難取裁今此纂以古補注為主互取二家及本論釋文融成一貫而參以直解詳略相因遞相發明但專境量以心所行相已備於百法纂中故此不重出頗省繁厭然字字有本全非己意妄竊為己見也此乃侍者廣益初入唯識法門老人教以研窮下手處使探討一過便見穩當若字字經心則見解不謬故精心參考以備遺忘非為呈之大方也天啓壬戌夏日七十七翁憨山老人手批
